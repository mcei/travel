remote_theme: "mmistakes/minimal-mistakes@4.24.0"
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

minimal_mistakes_skin: "dark"
post_navigation: false  # dont work
show_date: false

main:
  - title: "Главная"
    url: /
  - title: "О сайте"
    url: /about/
  - title: "Страница1"
    url: /subfolder/


# Остальные настройки
title: Название сайта
markdown: kramdown
highlighter: rouge

# Информация об авторе (отображается в левой колонке футера)
author:
  name: "Ваше Имя"
  email: "your-email@example.com"

# Описание сайта (отображается в правой колонке футера)
description: >-
  Блог о путешествиях. Здесь я делюсь впечатлениями, фотографиями и 
  полезными советами для самостоятельных путешествий.

exclude:
  - vendor
  - Gemfile
  - Gemfile.lock
  - cmds.txt

permalink: pretty